name: License audit

on:
  pull_request:
    paths:
      - "**/pyproject.toml"
      - "**/package.json"
      - "tools/license-allowlist.txt"
      - "tools/license-overrides.txt"
      - "tools/license_audit.py"
      - "tools/spdx_check.py"
      - "THIRD_PARTY_NOTICES.md"
      - "NOTICE"
      - "LICENSE"
      - ".github/workflows/license-audit.yml"
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  license-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Required for ``spdx_check.py --changed-only`` to compare
          # against origin/main.
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run license allowlist check
        run: python tools/license_audit.py

      - name: Run NOTICES staleness check
        run: python tools/license_audit.py --check-notices

      - name: Run SPDX-header check (changed files only)
        env:
          # On a pull_request event, ``github.event.pull_request.base.sha`` is
          # the merge target. Falls back to HEAD~1 for push events.
          BASE_SHA: ${{ github.event.pull_request.base.sha || 'HEAD~1' }}
        run: python tools/spdx_check.py --changed-only --base "$BASE_SHA"
