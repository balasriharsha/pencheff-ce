name: Release SBOM

# Phase 1.3 — every release tag publishes a CycloneDX 1.5 + SPDX 2.3
# SBOM for Pencheff itself. Signed with cosign keyless (Sigstore) so
# downstream auditors get supply-chain attestation without us managing
# private keys.
#
# The same engine (plugins/pencheff/.../sbom_generator.py) also runs
# against customer repos in the SaaS worker — generating one for our
# own repo on every release means the customer-facing SBOM tooling is
# dogfooded on every tag.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to attach the SBOM to (workflow_dispatch only)."
        required: false

permissions:
  contents: write       # upload artifacts to the GitHub Release
  id-token: write       # cosign keyless signing via Sigstore OIDC

jobs:
  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install the Pencheff plugin (provides the SBOM engine)
        run: |
          python -m pip install --upgrade pip
          pip install -e plugins/pencheff

      - name: Generate SBOMs (CycloneDX 1.5 + SPDX 2.3)
        run: python tools/generate_pencheff_sbom.py

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign SBOMs (keyless via Sigstore)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail
          for f in sbom-out/cyclonedx.json sbom-out/spdx.json; do
            [[ -f "$f" ]] || continue
            cosign sign-blob --yes "$f" \
              --output-signature "${f}.sig" \
              --output-certificate "${f}.pem"
            echo "signed $f"
          done

      - name: Resolve release tag
        id: tag
        run: |
          if [[ -n "${{ github.event.inputs.tag }}" ]]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Attach SBOMs to the GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.tag }}"
          if [[ -z "$tag" ]]; then
            echo "no tag resolved — skipping upload"
            exit 0
          fi
          # Create the release if it doesn't exist yet (workflow_dispatch path).
          if ! gh release view "$tag" --json tagName >/dev/null 2>&1; then
            gh release create "$tag" --title "$tag" --notes "Auto-generated by release-sbom.yml"
          fi
          for f in sbom-out/*.json sbom-out/*.sig sbom-out/*.pem; do
            [[ -f "$f" ]] || continue
            gh release upload "$tag" "$f" --clobber
          done

      - name: Upload SBOM as workflow artifact (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pencheff-sbom-${{ steps.tag.outputs.tag || github.sha }}
          path: |
            sbom-out/cyclonedx.json
            sbom-out/spdx.json
            sbom-out/*.sig
            sbom-out/*.pem
          if-no-files-found: warn
