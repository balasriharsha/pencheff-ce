name: Pencheff Security Scan

# Disabled — re-enable by restoring the triggers below
on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Target URL to scan'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Target URL to scan'
        required: true
        type: string
      profile:
        description: 'Scan profile'
        required: false
        default: 'cicd'
        type: choice
        options: [quick, cicd, standard, api-only, compliance]
      fail_on:
        description: 'Fail pipeline on findings at or above this severity'
        required: false
        default: 'high'
        type: choice
        options: [critical, high, medium, low, info]

env:
  TARGET_URL: ${{ inputs.target_url || vars.PENCHEFF_TARGET_URL }}
  SCAN_PROFILE: ${{ inputs.profile || 'cicd' }}
  FAIL_ON: ${{ inputs.fail_on || 'high' }}

jobs:
  pencheff-scan:
    name: Security Scan (${{ env.SCAN_PROFILE }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write       # for GitHub Issues ticketing export
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Pencheff
        run: |
          pip install pencheff[full]
          # Optional: install browser for DOM XSS and authenticated scanning
          # pip install playwright && playwright install chromium --with-deps

      - name: Install external security tools (optional)
        run: |
          # Install lightweight tools that don't require sudo
          pip install wafw00f sslyze || true
          go install github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest || true
          go install github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest || true
        continue-on-error: true

      - name: Run Pencheff scan
        id: scan
        run: |
          pencheff scan \
            --target "${{ env.TARGET_URL }}" \
            --profile "${{ env.SCAN_PROFILE }}" \
            --fail-on "${{ env.FAIL_ON }}" \
            --save-history \
            --format json \
            --output ./pencheff-reports \
          | tee pencheff-results.json
        env:
          JIRA_URL: ${{ secrets.JIRA_URL }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_PROJECT: ${{ secrets.JIRA_PROJECT }}

      - name: Upload scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pencheff-report-${{ github.run_id }}
          path: |
            pencheff-reports/
            pencheff-results.json
          retention-days: 30

      - name: Create GitHub Issues for critical/high findings
        if: failure() && env.TARGET_URL != ''
        run: |
          python -c "
          import asyncio, json, sys
          from pencheff.core.scan_history import list_scans
          scans = list_scans('${{ env.TARGET_URL }}')
          if scans:
              print(f'Latest scan: {scans[0][\"session_id\"]}')
          "
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Post summary to PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let summary = '## Pencheff Security Scan\n\n';
            try {
              const results = JSON.parse(fs.readFileSync('pencheff-results.json', 'utf8'));
              const sev = results.summary || {};
              summary += `| Severity | Count |\n|---|---|\n`;
              for (const [k, v] of Object.entries(sev)) {
                if (v > 0) summary += `| ${k} | ${v} |\n`;
              }
              summary += `\n**Total findings:** ${results.total_findings || 0}\n`;
              summary += `\n**Session ID:** \`${results.session_id || 'N/A'}\`\n`;
            } catch (e) {
              summary += `⚠️ Could not parse scan results: ${e.message}\n`;
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary,
            });
