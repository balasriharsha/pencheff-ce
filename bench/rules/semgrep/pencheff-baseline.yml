rules:
  - id: pencheff.generic.private-key
    languages: [generic]
    severity: ERROR
    message: Possible private key material committed to the repository.
    pattern-regex: '-----BEGIN (RSA |DSA |EC |OPENSSH )?PRIVATE KEY-----'
    metadata:
      license: MIT
      category: secrets

  - id: pencheff.generic.hardcoded-secret
    languages: [generic]
    severity: WARNING
    message: Possible hardcoded secret or token.
    pattern-regex: '(?i)(api[_-]?key|secret|token|password)\s*[:=]\s*[''"][A-Za-z0-9_./+=-]{16,}[''"]'
    metadata:
      license: MIT
      category: secrets

  - id: pencheff.generic.insecure-http-url
    languages: [generic]
    severity: INFO
    message: Plain HTTP URL found; confirm this is intentional.
    pattern-regex: 'http://[^\s''"<>]+'
    metadata:
      license: MIT
      category: transport-security
