<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Pencheff Proxy — options</title>
  <style>
    body { font: 13px/1.5 system-ui, sans-serif; padding: 16px; max-width: 520px; }
    h1 { font-size: 14px; text-transform: uppercase; }
    label { display: block; margin-top: 12px; font-size: 11px; text-transform: uppercase; }
    textarea { width: 100%; height: 100px; font: 12px monospace; }
    button { padding: 4px 10px; border: 1.5px solid #000; background: #fce985; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Pencheff Proxy — options</h1>
  <label>Scope (one host per line — extension only ingests requests to these hosts)</label>
  <textarea id="scope" placeholder="api.example.com&#10;www.example.com"></textarea>
  <label><input id="paused" type="checkbox"> Paused (don't ingest anything)</label>
  <p><button id="save">Save</button> <span id="msg"></span></p>
  <script src="options.js" type="module"></script>
</body>
</html>
