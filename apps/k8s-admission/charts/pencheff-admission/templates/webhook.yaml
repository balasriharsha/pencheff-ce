apiVersion: v1
kind: Service
metadata:
  name: {{ include "pencheff-admission.fullname" . }}
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app.kubernetes.io/name: {{ include "pencheff-admission.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: https
      port: 443
      targetPort: 8443
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "pencheff-admission.fullname" . }}
  namespace: {{ .Release.Namespace }}
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: {{ include "pencheff-admission.fullname" . }}
  annotations:
    pencheff.io/managed-by: helm
webhooks:
  - name: pods.pencheff.io
    sideEffects: None
    admissionReviewVersions: ["v1"]
    failurePolicy: {{ if .Values.failOpen }}Ignore{{ else }}Fail{{ end }}
    rules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        resources: ["pods"]
        operations: ["CREATE", "UPDATE"]
    clientConfig:
      service:
        name: {{ include "pencheff-admission.fullname" . }}
        namespace: {{ .Release.Namespace }}
        path: /validate
        port: 443
      # caBundle is patched in by the pre-install Job that generates
      # the self-signed cert; cert-manager users supply their own.
    namespaceSelector:
      {{- if .Values.namespaceSelector.matchLabels }}
      matchLabels:
        {{- toYaml .Values.namespaceSelector.matchLabels | nindent 8 }}
      {{- end }}
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            {{- range .Values.namespaceExclusions }}
            - {{ . | quote }}
            {{- end }}
