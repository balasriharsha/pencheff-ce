# Default license compliance policy. Override via --policy <file>.
allowed:
  - MIT
  - Apache-2.0
  - BSD-2-Clause
  - BSD-3-Clause
  - ISC
  - Zlib
  - Unlicense
  - 0BSD
  - Python-2.0
  - PSF-2.0
  - LGPL-2.1
  - LGPL-2.1-only
  - LGPL-3.0
  - LGPL-3.0-only
  - MPL-2.0
  - EPL-2.0

denied:
  - GPL-2.0
  - GPL-2.0-only
  - GPL-3.0
  - GPL-3.0-only
  - GPL-3.0-or-later
  - AGPL-3.0
  - AGPL-3.0-only
  - AGPL-3.0-or-later
  - SSPL-1.0

# Behavior when a license is neither allowed nor denied:
#   flag  — emit a LOW finding (default)
#   allow — silently permit
#   deny  — emit a MEDIUM finding and block
unknown_behavior: flag
